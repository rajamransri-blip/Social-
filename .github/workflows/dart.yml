name: BGMI UC Store APK Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.6'

      # ✅ ERROR KA DIRECT SOLUTION: Naya project banakar usme aapka code dalna
      - name: Create Fresh Project & Move Code
        run: |
          # 1. Server par ek bilkul naya app banayenge
          flutter create -t app fresh_app
          
          # 2. Naye app ka default lib folder delete karenge
          rm -rf fresh_app/lib
          
          # 3. Aapka lib folder aur pubspec.yaml naye app me copy karenge
          cp -r lib fresh_app/
          cp pubspec.yaml fresh_app/

      # ✅ NAYE PROJECT ME JAAKAR APK BUILD KARNA
      - name: Build APK in Fresh Project
        run: |
          cd fresh_app
          flutter pub get
          flutter build apk --release
          # Build hone ke baad APK ko bahar nikal lenge
          cp build/app/outputs/flutter-apk/app-release.apk ../app-release.apk

      - name: Upload Ready APK
        uses: actions/upload-artifact@v4
        with:
          name: bgmi-uc-store-apk
          path: app-release.apk
